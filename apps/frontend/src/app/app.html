@if (authService.isAuth()) {
  <ui-shell>
    <app-header (menuToggle)="toggleSidebar()"></app-header>

    <ui-sidebar [isOpen]="sidebarOpen()" (close)="closeSidebar()">
      <div sidebar-header class="w-full flex items-center justify-between md:hidden">
        <span class="font-bold text-primary">Menu</span>
        <button
          (click)="closeSidebar()"
          class="p-2 -mr-2 text-muted-foreground hover:text-foreground rounded-md transition-colors"
        >
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M6 18L18 6M6 6l12 12"
            ></path>
          </svg>
        </button>
      </div>

      <nav class="flex flex-col gap-1 px-4">
        <a
          routerLink="/dashboard"
          routerLinkActive="bg-primary/10 text-primary font-medium"
          [routerLinkActiveOptions]="{ exact: true }"
          (click)="closeSidebar()"
          class="flex items-center gap-3 rounded-lg px-3 py-2 text-muted-foreground transition-all hover:text-foreground"
        >
          <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"
            ></path>
          </svg>
          Tela Principal
        </a>

        @if (authService.isAdmin()) {
          <a
            routerLink="/admin/users"
            routerLinkActive="bg-primary/10 text-primary font-medium"
            [routerLinkActiveOptions]="{ exact: true }"
            (click)="closeSidebar()"
            class="flex items-center gap-3 rounded-lg px-3 py-2 text-muted-foreground transition-all hover:text-foreground"
          >
            <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"
              ></path>
            </svg>
            Usuários
          </a>
        }
        <a
          routerLink="/apicultura/apiarios"
          routerLinkActive="bg-primary/10 text-primary font-medium"
          (click)="closeSidebar()"
          class="flex items-center gap-3 rounded-lg px-3 py-2 text-muted-foreground transition-all hover:text-foreground"
        >
          <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"
            ></path>
          </svg>
          Apiários (Pai)
        </a>
        <a
          routerLink="/apicultura/colmeias"
          routerLinkActive="bg-primary/10 text-primary font-medium"
          (click)="closeSidebar()"
          class="flex items-center gap-3 rounded-lg px-3 py-2 text-muted-foreground transition-all hover:text-foreground"
        >
          <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"
            ></path>
          </svg>
          Colmeias (Filho)
        </a>
        <a
          routerLink="/apicultura/colheitas"
          routerLinkActive="bg-primary/10 text-primary font-medium"
          (click)="closeSidebar()"
          class="flex items-center gap-3 rounded-lg px-3 py-2 text-muted-foreground transition-all hover:text-foreground"
        >
          <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 9.172V5L8 4z"
            ></path>
          </svg>
          Colheitas
        </a>
      </nav>

      <div sidebar-footer class="text-xs text-muted-foreground text-center">
        Universidade Estadual de Goiás<br />© 2026
      </div>
    </ui-sidebar>

    <router-outlet></router-outlet>
  </ui-shell>
} @else {
  <div class="flex flex-col min-h-screen bg-background transition-colors duration-200">
    <app-header></app-header>
    <main class="flex-1 relative flex flex-col">
      <router-outlet></router-outlet>
    </main>
  </div>
}

<ui-toast></ui-toast>
